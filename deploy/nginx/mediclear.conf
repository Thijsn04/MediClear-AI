# ===========================================================================
# MediClear AI: hardened Nginx reverse proxy with TLS termination.
#
# Place your certificate and key, then:
#   nginx -t -c /etc/nginx/nginx.conf   # validate
#   systemctl reload nginx
#
# Assumes the app runs on 127.0.0.1:8000 (or change `upstream` below).
# ===========================================================================

upstream mediclear_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name mediclear.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mediclear.example.com;

    # --- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers --------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # The bundled frontend is fully self-contained (no external assets), so a
    # strict CSP is safe. Tighten further if you embed the API elsewhere.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' blob:; connect-src 'self'" always;

    # Upload ceiling (matches MAX_REQUEST_BODY_BYTES).
    client_max_body_size 12m;

    location / {
        proxy_pass http://mediclear_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SSE streaming endpoint: disable buffering so chat tokens flush live.
    location ~ ^/api/v1/chat/.+/stream$ {
        proxy_pass http://mediclear_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Do not expose Prometheus metrics publicly; restrict to your monitoring net.
    location /metrics {
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://mediclear_backend;
    }
}
