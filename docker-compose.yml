# ════════════════════════════════════════════════════════════
# MediClear AI — Docker Compose
#
#   cp .env.example .env   # set AI_PROVIDER + key/model
#   docker compose up -d
#   open http://localhost:8000
#
# Uncomment the `redis` service (and REDIS_URL in .env) for durable,
# multi-instance sessions / cache / rate limiting.
# ════════════════════════════════════════════════════════════

services:
  mediclear:
    build:
      context: .
      args:
        EXTRAS: "gemini,openai,anthropic,metrics"
    image: mediclear-ai:latest
    container_name: mediclear-ai
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # depends_on:
    #   - redis

  # redis:
